<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CMU E-Commerce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <div class="logo">CMU CICS <span>E-Commerce Prototype</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Products</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="login.html" class="active">Login</a></li>
            </ul>
        </div>
    </header>

    <main class="container">
        <div class="form-container">
            <h2 style="text-align: center; color: #006633; margin-bottom: 25px;">🔐 Sign In</h2>
            <p style="text-align: center; margin-bottom: 20px; background: #e8f5e9; padding: 8px; border-radius: 20px;">
                <strong>Simulation:</strong> Use "student@cmu.edu.ph" / "password"
            </p>
            
            <form action="dashboard.html" method="get">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="student@cmu.edu.ph" value="student@cmu.edu.ph" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" value="password" required>
                </div>
                <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <input type="checkbox" id="remember"> <label for="remember">Remember me</label>
                    </div>
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-block">Login (Go to Dashboard)</button>
                <hr style="margin: 20px 0;">
                <p style="text-align: center;">Don't have an account? <a href="register.html">Register here</a></p>
            </form>
        </div>
    </main>

    <footer>
        <p>IT 56 - Web Systems and Technologies 2 | Central Mindanao University</p>
    </footer>
</body>
</html>
